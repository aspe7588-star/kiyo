<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 Anime Terbaik Wajib Ditonton</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: linear-gradient(135deg, #0f0c29 0%, #1a1a2e 50%, #16213e 100%); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 2.5em; margin-bottom: 8px; background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { color: #aaa; }
        .controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; }
        .controls input { padding: 10px 18px; border: 1px solid rgba(255,255,255,0.2); border-radius: 25px; background: rgba(255,255,255,0.08); color: #fff; font-size: 0.9em; outline: none; min-width: 250px; }
        .controls input:focus { border-color: #667eea; }
        .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 25px; }
        .filter-btn { padding: 6px 14px; border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; background: rgba(255,255,255,0.05); color: #ccc; cursor: pointer; font-size: 0.8em; transition: all 0.3s; }
        .filter-btn:hover, .filter-btn.active { background: linear-gradient(135deg, #667eea, #764ba2); border-color: transparent; color: #fff; }
        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .anime-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; overflow: hidden; transition: all 0.3s; }
        .anime-card:hover { transform: translateY(-4px); box-shadow: 0 8px 25px rgba(102,126,234,0.2); border-color: rgba(102,126,234,0.4); }
        .anime-card .poster { width: 100%; height: 350px; object-fit: cover; display: block; }
        .anime-card .info { padding: 12px; }
        .anime-card .rank { display: inline-block; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; font-weight: 700; padding: 2px 8px; border-radius: 10px; font-size: 0.7em; margin-bottom: 6px; }
        .anime-card .title { font-size: 1em; font-weight: 700; margin-bottom: 4px; }
        .anime-card .meta { font-size: 0.75em; color: #888; margin-bottom: 6px; }
        .anime-card .hook { font-size: 0.8em; color: #bbb; font-style: italic; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .anime-card .rating { font-size: 0.8em; color: #feca57; font-weight: 600; margin-top: 6px; }
        .anime-card .btn-trailer { display: inline-flex; align-items: center; gap: 4px; margin-top: 8px; padding: 5px 10px; background: rgba(255,0,0,0.15); border: 1px solid rgba(255,0,0,0.4); border-radius: 6px; color: #ff4444; font-size: 0.75em; font-weight: 600; cursor: pointer; transition: all 0.3s; text-decoration: none; }
        .anime-card .btn-trailer:hover { background: rgba(255,0,0,0.3); }
        .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 30px; }
        .page-btn { padding: 8px 14px; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; background: rgba(255,255,255,0.05); color: #ccc; cursor: pointer; font-size: 0.85em; transition: all 0.3s; }
        .page-btn:hover, .page-btn.active { background: linear-gradient(135deg, #667eea, #764ba2); border-color: transparent; color: #fff; }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .page-info { color: #888; font-size: 0.85em; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal-overlay.show { display: flex; }
        .modal-video { width: 100%; max-width: 800px; background: #000; border-radius: 12px; overflow: hidden; position: relative; }
        .modal-video .close-btn { position: absolute; top: -35px; right: 0; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: #fff; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 1.1em; display: flex; align-items: center; justify-content: center; }
        .modal-video .close-btn:hover { background: rgba(233,69,96,0.5); }
        .modal-video iframe { width: 100%; aspect-ratio: 16/9; border: none; display: block; }
        .modal-video .video-title { padding: 10px 12px; background: rgba(255,255,255,0.05); font-size: 0.85em; color: #ccc; }
        @media (max-width: 600px) { .header h1 { font-size: 1.6em; } .anime-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>100 Anime Terbaik Wajib Ditonton</h1>
        <p>Koleksi lengkap anime legendaris dengan cuplikan yang bikin penasaran</p>
    </div>
    <div class="controls">
        <input type="text" id="searchInput" placeholder="Cari anime..." oninput="searchAnime()" />
    </div>
    <div class="filter-bar" id="filterBar">
        <button class="filter-btn active" onclick="filterAnime('all')">Semua</button>
        <button class="filter-btn" onclick="filterAnime('action')">Action</button>
        <button class="filter-btn" onclick="filterAnime('adventure')">Adventure</button>
        <button class="filter-btn" onclick="filterAnime('drama')">Drama</button>
        <button class="filter-btn" onclick="filterAnime('fantasy')">Fantasy</button>
        <button class="filter-btn" onclick="filterAnime('thriller')">Thriller</button>
        <button class="filter-btn" onclick="filterAnime('romance')">Romance</button>
        <button class="filter-btn" onclick="filterAnime('sci-fi')">Sci-Fi</button>
        <button class="filter-btn" onclick="filterAnime('comedy')">Comedy</button>
        <button class="filter-btn" onclick="filterAnime('horror')">Horror</button>
    </div>
    <div class="anime-grid" id="animeGrid"></div>
    <div class="pagination" id="pagination"></div>
</div>
<div class="modal-overlay" id="videoModal" onclick="closeTrailer(event)">
    <div class="modal-video" onclick="event.stopPropagation()">
        <button class="close-btn" onclick="closeTrailer()">&times;</button>
        <iframe id="videoFrame" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        <div class="video-title" id="videoTitle">Trailer</div>
    </div>
</div>
<script src="anime_data.js"></script>
<script>
let currentPage = 1;
const perPage = 20;
let currentFilter = 'all';
let searchQuery = '';

function getFiltered() {
    let list = animeList;
    if (currentFilter !== 'all') list = list.filter(a => a.genres.includes(currentFilter));
    if (searchQuery) list = list.filter(a => a.title.toLowerCase().includes(searchQuery.toLowerCase()));
    return list;
}

function renderPage() {
    const filtered = getFiltered();
    const totalPages = Math.ceil(filtered.length / perPage);
    if (currentPage > totalPages) currentPage = totalPages || 1;
    const start = (currentPage - 1) * perPage;
    const pageItems = filtered.slice(start, start + perPage);
    const grid = document.getElementById('animeGrid');
    grid.innerHTML = pageItems.length ? pageItems.map(anime => `
        <div class="anime-card">
            <img class="poster" src="${anime.image}" alt="${anime.title}" onerror="this.src='https://via.placeholder.com/260x350/1a1a2e/667eea?text=${encodeURIComponent(anime.title)}'" loading="lazy" />
            <div class="info">
                <span class="rank">#${anime.rank}</span>
                <div class="title">${anime.title}</div>
                <div class="meta">${anime.year} | ${anime.episodes}</div>
                <div class="hook">"${anime.hook}"</div>
                <div class="rating">&#9733; ${anime.rating}/10</div>
                ${anime.trailer ? `<button class="btn-trailer" onclick="playTrailer('${anime.trailer}','${anime.title.replace(/'/g,"\\'")}')">&#9654; Trailer</button>` : ''}
            </div>
        </div>
    `).join('') : '<p style="text-align:center;color:#666;grid-column:1/-1;">Tidak ada anime ditemukan.</p>';
    renderPagination(totalPages);
    window.scrollTo({top: 0, behavior: 'smooth'});
}

function renderPagination(totalPages) {
    const el = document.getElementById('pagination');
    if (totalPages <= 1) { el.innerHTML = ''; return; }
    let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>&#8592;</button>`;
    for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= currentPage-2 && i <= currentPage+2)) {
            html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
        } else if (i === currentPage-3 || i === currentPage+3) {
            html += `<span class="page-info">...</span>`;
        }
    }
    html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>&#8594;</button>`;
    html += `<span class="page-info">${currentPage}/${totalPages} (${getFiltered().length} anime)</span>`;
    el.innerHTML = html;
}

function goPage(p) { currentPage = p; renderPage(); }
function filterAnime(genre) {
    currentFilter = genre;
    currentPage = 1;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    renderPage();
}
function searchAnime() {
    searchQuery = document.getElementById('searchInput').value;
    currentPage = 1;
    renderPage();
}
function playTrailer(id, title) {
    document.getElementById('videoFrame').src = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0&modestbranding=1`;
    document.getElementById('videoTitle').innerHTML = `Trailer: ${title} | <a href="https://www.youtube.com/watch?v=${id}" target="_blank" style="color:#667eea;">Buka di YouTube</a>`;
    document.getElementById('videoModal').classList.add('show');
    document.body.style.overflow = 'hidden';
}
function closeTrailer(e) {
    if (e && e.target && e.target !== document.getElementById('videoModal')) return;
    document.getElementById('videoFrame').src = '';
    document.getElementById('videoModal').classList.remove('show');
    document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeTrailer(); });
renderPage();
</script>
</body>
</html>
