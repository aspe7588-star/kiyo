<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Anime Terbaik Wajib Ditonton</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 1100px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 {
            font-size: 2.5em; margin-bottom: 10px;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p { color: #aaa; font-size: 1em; }
        .filter-bar {
            display: flex; gap: 10px; flex-wrap: wrap;
            justify-content: center; margin-bottom: 30px;
        }
        .filter-btn {
            padding: 8px 18px; border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px; background: rgba(255,255,255,0.05);
            color: #ccc; cursor: pointer; font-size: 0.85em;
            transition: all 0.3s;
        }
        .filter-btn:hover, .filter-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: transparent; color: #fff;
        }
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }
        .anime-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s;
        }
        .anime-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102,126,234,0.2);
            border-color: rgba(102,126,234,0.4);
        }
        .anime-card .poster-wrap {
            position: relative;
            overflow: hidden;
        }
        .anime-card .poster {
            width: 100%; height: 380px;
            object-fit: cover;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: block;
        }
        .anime-card .play-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.3s; cursor: pointer;
        }
        .anime-card:hover .play-overlay { opacity: 1; }
        .play-btn-icon {
            width: 60px; height: 60px;
            background: rgba(255,0,0,0.9);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.3s;
        }
        .play-btn-icon:hover { transform: scale(1.15); }
        .play-btn-icon::after {
            content: '';
            display: block;
            width: 0; height: 0;
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            border-left: 20px solid #fff;
            margin-left: 4px;
        }
        .anime-card .info { padding: 15px; }
        .anime-card .rank {
            display: inline-block;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff; font-weight: 700;
            padding: 3px 10px; border-radius: 12px;
            font-size: 0.75em; margin-bottom: 8px;
        }
        .anime-card .title {
            font-size: 1.1em; font-weight: 700;
            margin-bottom: 5px; color: #fff;
        }
        .anime-card .meta {
            font-size: 0.8em; color: #888; margin-bottom: 8px;
        }
        .anime-card .genre-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
        .anime-card .genre-tag {
            padding: 2px 8px; border-radius: 10px;
            font-size: 0.7em; background: rgba(255,255,255,0.08);
            color: #aaa; border: 1px solid rgba(255,255,255,0.1);
        }
        .anime-card .rating {
            display: flex; align-items: center; gap: 5px;
            font-size: 0.85em; color: #feca57; font-weight: 600;
        }
        .anime-card .desc {
            font-size: 0.8em; color: #888; margin-top: 8px;
            line-height: 1.5;
            display: -webkit-box; -webkit-line-clamp: 3;
            -webkit-box-orient: vertical; overflow: hidden;
        }
        .btn-trailer {
            display: inline-flex; align-items: center; gap: 6px;
            margin-top: 10px; padding: 7px 14px;
            background: rgba(255,0,0,0.15);
            border: 1px solid rgba(255,0,0,0.4);
            border-radius: 8px; color: #ff4444;
            font-size: 0.8em; font-weight: 600;
            cursor: pointer; transition: all 0.3s;
            text-decoration: none;
        }
        .btn-trailer:hover {
            background: rgba(255,0,0,0.3);
            transform: translateY(-1px);
        }
        .btn-trailer svg {
            width: 16px; height: 16px; fill: #ff4444;
        }
        /* Modal */
        .modal-overlay {
            display: none; position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center; align-items: center;
            padding: 20px;
        }
        .modal-overlay.show { display: flex; }
        .modal-video {
            width: 100%; max-width: 850px;
            background: #000; border-radius: 12px;
            overflow: hidden; position: relative;
        }
        .modal-video .close-btn {
            position: absolute; top: -40px; right: 0;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff; width: 35px; height: 35px;
            border-radius: 50%; cursor: pointer;
            font-size: 1.2em; display: flex;
            align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .modal-video .close-btn:hover { background: rgba(233,69,96,0.5); }
        .modal-video iframe {
            width: 100%; aspect-ratio: 16/9;
            border: none; display: block;
        }
        .modal-video .video-title {
            padding: 12px 15px;
            background: rgba(255,255,255,0.05);
            font-size: 0.9em; color: #ccc;
        }
        @media (max-width: 600px) {
            .header h1 { font-size: 1.7em; }
            .anime-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

// Render anime cards
function renderAnime(filter = 'all') {
    const grid = document.getElementById('animeGrid');
    const filtered = filter === 'all' ? animeList : animeList.filter(a => a.genres.includes(filter));

    grid.innerHTML = filtered.map(anime => `
        <div class="anime-card" data-genres="${anime.genres.join(',')}">
            <div class="poster-wrap">
                <img class="poster" src="${anime.image}" alt="${anime.title}" onerror="this.src='https://via.placeholder.com/300x400/1a1a2e/667eea?text=${encodeURIComponent(anime.title)}'" loading="lazy" />
                <div class="play-overlay" onclick="playTrailer('${anime.trailer}', '${anime.title}')">
                    <div class="play-btn-icon"></div>
                </div>
            </div>
            <div class="info">
                <span class="rank">#${anime.rank}</span>
                <div class="title">${anime.title}</div>
                <div class="meta">${anime.japanese} | ${anime.year} | ${anime.episodes}</div>
                <div class="genre-tags">
                    ${anime.genres.map(g => `<span class="genre-tag">${g}</span>`).join('')}
                </div>
                <div class="rating">&#9733; ${anime.rating}/10</div>
                <div class="desc">${anime.desc}</div>
                <button class="btn-trailer" onclick="playTrailer('${anime.trailer}', '${anime.title}')">
                    <svg viewBox="0 0 24 24"><path d="M10 16.5l6-4.5-6-4.5v9zM12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
                    Tonton Trailer
                </button>
            </div>
        </div>
    `).join('');
}

// Filter
function filterAnime(genre) {
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    renderAnime(genre);
}

// Play trailer in modal
function playTrailer(videoId, title) {
    const modal = document.getElementById('videoModal');
    const frame = document.getElementById('videoFrame');
    const titleEl = document.getElementById('videoTitle');

    frame.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1`;
    titleEl.innerHTML = `Trailer: ${title} | <a href="https://www.youtube.com/watch?v=${videoId}" target="_blank" style="color:#667eea;text-decoration:underline;">Buka di YouTube</a>`;
    modal.classList.add('show');
    document.body.style.overflow = 'hidden';
}

// Close trailer modal
function closeTrailer(event) {
    if (event && event.target && event.target !== document.getElementById('videoModal')) return;
    const modal = document.getElementById('videoModal');
    const frame = document.getElementById('videoFrame');
    frame.src = '';
    modal.classList.remove('show');
    document.body.style.overflow = '';
}

// ESC key to close
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeTrailer();
});

// Init
